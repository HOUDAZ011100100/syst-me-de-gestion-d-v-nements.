services:
  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: VELORA
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://127.0.0.1:8000
      APP_LOCALE: fr
      APP_FALLBACK_LOCALE: fr
      PORT: "8080"
      DB_CONNECTION: mongodb
      DB_DSN: mongodb://mongodb:27017/?replicaSet=rs0
      DB_DATABASE: velora
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      REDIS_HOST: redis
      LOG_CHANNEL: stack
      SEED_DEMO_DATA: "1"
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8080"
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(@file_get_contents(\"http://127.0.0.1:8080/api/health\") === false ? 1 : 0);'"]
      interval: 5s
      timeout: 3s
      retries: 30

  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      VITE_API_URL: /api
      VITE_BACKEND_URL: http://backend:8080
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    environment:
      APP_NAME: VELORA
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://127.0.0.1:8000
      APP_LOCALE: fr
      APP_FALLBACK_LOCALE: fr
      DB_CONNECTION: mongodb
      DB_DSN: mongodb://mongodb:27017/?replicaSet=rs0
      DB_DATABASE: velora
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      REDIS_HOST: redis
      LOG_CHANNEL: stack
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    depends_on:
      backend:
        condition: service_healthy
    command: ["php", "artisan", "queue:work", "redis", "--tries=3", "--timeout=120"]

  mongodb:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'try { rs.status().ok } catch (e) { rs.initiate({_id:\"rs0\",members:[{_id:0,host:\"mongodb:27017\"}]}).ok }' | grep 1"]
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  backend_vendor:
  frontend_node_modules:
  mongodb_data:
  redis_data:
