# Default SonarCloud configuration
sonar.projectKey=your_project_key_here
sonar.organization=your_organization_here

# Paths to source code
sonar.sources=backend/app,frontend/src
sonar.exclusions=**/vendor/**,**/node_modules/**,**/tests/**,**/*.spec.js,**/*.test.js

# Languages
sonar.language=php,js

# Backend specific
sonar.php.exclusions=**/vendor/**

# Frontend specific
sonar.javascript.node.maxstacksize=400
