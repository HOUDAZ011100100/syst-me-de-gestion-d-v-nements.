services:
  - type: web
    name: velora-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://velora-backend.onrender.com
      - key: APP_DEBUG
        value: "false"
      - key: RUN_MIGRATIONS
        value: "1"
      - key: SEED_DEMO_DATA
        value: "0"
      - key: DB_CONNECTION
        value: mongodb
      - key: DB_DSN
        sync: false # I will fill this from MongoDB Atlas
      - key: DB_DATABASE
        value: velora
      - key: SESSION_DRIVER
        value: cookie # Use cookie for session if Redis is not available or too expensive to setup free
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: CORS_ALLOWED_ORIGINS
        value: https://velora-frontend.onrender.com,https://sec-ret-cms.vercel.app

  - type: web
    name: velora-frontend
    env: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://velora-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
